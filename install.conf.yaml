- clean: ['~']

- link:
    ~/.config/nvim:
        path: nvim/
        create: true
- shell:
  -
    command: curl -fLo ~/.local/share/nvim/site/autoload/plug.vim --create-dirs https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim
    stdout: true
    description: install plug (a plugin management)
  -
    command: sudo snap install nvim
    stdin: true
    stdout: true
  -
    command: nvim -c PlugInstall -c q! -c q!
    stdout: true
